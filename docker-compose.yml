services:
  postgres:
    image: postgres:16-alpine
    container_name: wms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: khemu123456
      POSTGRES_DB: ticketing-platform
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wms-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wms-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ticketing
      RABBITMQ_DEFAULT_PASS: ticketing123
    ports:
      - "5673:5672"     # host:container — avoids colliding with native RabbitMQ on 5672
      - "15673:15672"   # management UI, same reasoning

  api-gateway-service:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: wms-api-gateway
    restart: unless-stopped
    env_file: ./api-gateway/.env.development
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://ticketing:ticketing123@rabbitmq:5672
      DATABASE_URL: postgresql://postgres:khemu123456@postgres:5432/ticketing-platform
    depends_on:
      - postgres
      - rabbitmq
      - redis

volumes:
  postgres_data:
