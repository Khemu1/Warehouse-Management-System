services:
  postgres:
    image: postgres:16-alpine
    container_name: wms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: khemu123456
      POSTGRES_DB: wms-platform
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wms-platform"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: wms-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wms-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: wms
      RABBITMQ_DEFAULT_PASS: wms123
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  api-gateway-service:
    build:
      context: ./server
      dockerfile: api-gateway/Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: wms-api-gateway
    restart: unless-stopped
    env_file: ./server/api-gateway/.env.development
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://wms:wms123@rabbitmq:5672
      DATABASE_URL: postgresql://postgres:khemu123456@postgres:5432/wms-platform
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  auth-service:
    build:
      context: ./server
      dockerfile: auth-service/Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: wms-auth-service
    restart: unless-stopped
    env_file: ./server/auth-service/.env.development
    environment:
      DATABASE_HOST: postgres
      DATABASE_URL: postgresql://postgres:khemu123456@postgres:5432/wms-platform
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://wms:wms123@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api-gateway-service:
        condition: service_healthy

  inventory-service:
    build:
      context: ./server
      dockerfile: inventory-service/Dockerfile
      args:
        SERVICE_NAME: inventory-service
    container_name: wms-inventory-service
    restart: unless-stopped
    env_file: ./server/inventory-service/.env.development
    environment:
      DATABASE_HOST: postgres
      DATABASE_URL: postgresql://postgres:khemu123456@postgres:5432/wms-platform
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://wms:wms123@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway-service:
        condition: service_healthy
      auth-service:
        condition: service_started

  orders-service:
    build:
      context: ./server
      dockerfile: orders-service/Dockerfile
      args:
        SERVICE_NAME: orders-service
    container_name: wms-orders-service
    restart: unless-stopped
    env_file: ./server/orders-service/.env.development
    environment:
      DATABASE_HOST: postgres
      DATABASE_URL: postgresql://postgres:khemu123456@postgres:5432/wms-platform
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://wms:wms123@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway-service:
        condition: service_healthy
      auth-service:
        condition: service_started

  payment-service:
    build:
      context: ./server
      dockerfile: payment-service/Dockerfile
      args:
        SERVICE_NAME: payment-service
    container_name: wms-payment-service
    restart: unless-stopped
    env_file: ./server/payment-service/.env.development
    environment:
      DATABASE_HOST: postgres
      DATABASE_URL: postgresql://postgres:khemu123456@postgres:5432/wms-platform
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://wms:wms123@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      orders-service:
        condition: service_started

  migrator:
    build:
      context: ./server
      dockerfile: shared/Dockerfile.migrate
    env_file: ./server/shared/.env.production
    environment:
      DATABASE_URL: postgresql://postgres:khemu123456@postgres:5432/wms-platform
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wms-frontend
    ports:
      - "80:80"
    depends_on:
      api-gateway-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      inventory-service:
        condition: service_started
      orders-service:
        condition: service_started
      payment-service:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data: